name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild better-sqlite3 for Node runtime
        run: npm rebuild better-sqlite3

      - name: Run tests
        run: npm run test

      - name: Run type checks
        run: npm run lint

      - name: Build app
        run: npm run build
